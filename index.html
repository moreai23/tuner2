<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>チューナーv2</title>
<meta name="description" content="guitar & ukulele tuning apri">
<!-- PWA / ホーム画面追加用 -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0f">
<!-- フォントをオフライン時はシステムフォントにフォールバックして非同期読み込み -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500&display=swap" media="print" onload="this.media='all'">
<style>
  /* オフライン対応：Google Fonts は非同期で読み込み、未取得時はシステムフォントで代替 */
  /* フォントフォールバック（オフライン時） */
  @font-face{font-family:'Orbitron';src:local('Orbitron');font-display:swap;}
  @font-face{font-family:'Noto Sans JP';src:local('Noto Sans JP'),local('NotoSansJP');font-display:swap;}
  :root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a25;--accent:#00e5ff;--accent2:#ff6b35;--green:#00ff88;--red:#ff3366;--yellow:#ffcc00;--text:#e8e8f0;--border:rgba(0,229,255,0.15);--glow:0 0 20px rgba(0,229,255,0.3);}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP','Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 30% 20%,rgba(0,229,255,0.04) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(255,107,53,0.04) 0%,transparent 60%);pointer-events:none;z-index:0;}
  .app{position:relative;z-index:1;max-width:430px;margin:0 auto;padding:16px 16px 40px;min-height:100vh;display:flex;flex-direction:column;gap:12px;}
  .header{display:flex;justify-content:space-between;align-items:center;padding:8px 0;}
  .header-title{font-family:'Orbitron','Courier New',monospace;font-size:20px;font-weight:900;color:var(--accent);letter-spacing:4px;text-shadow:var(--glow);}
  .header-sub{font-size:10px;color:rgba(0,229,255,0.5);letter-spacing:2px;margin-top:2px;}
  .instrument-tabs{display:flex;background:var(--surface);border-radius:12px;padding:4px;border:1px solid var(--border);gap:4px;}
  .inst-tab{flex:1;padding:10px 8px;text-align:center;border-radius:9px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;color:rgba(232,232,240,0.5);user-select:none;}
  .inst-tab.active{background:var(--surface2);color:var(--accent);box-shadow:var(--glow);border:1px solid rgba(0,229,255,0.3);}
  .inst-tab span{display:block;font-size:18px;margin-bottom:2px;}
  .meter-card{background:var(--surface);border-radius:20px;border:1px solid var(--border);padding:20px 16px;position:relative;overflow:hidden;}
  .meter-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.4;}
  .note-display{text-align:center;margin-bottom:16px;}
  .note-name{font-family:'Orbitron','Courier New',monospace;font-size:72px;font-weight:900;line-height:1;color:var(--text);transition:color 0.15s;}
  .note-name.in-tune{color:var(--green);text-shadow:0 0 30px rgba(0,255,136,0.5);}
  .note-name.sharp{color:var(--red);}
  .note-name.flat{color:var(--yellow);}
  .note-freq{font-family:'Orbitron','Courier New',monospace;font-size:13px;color:rgba(232,232,240,0.4);letter-spacing:2px;margin-top:4px;}
  .cents-scale{position:relative;height:44px;background:var(--surface2);border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.05);margin-bottom:4px;}
  .center-line{position:absolute;left:50%;top:4px;width:2px;height:36px;background:rgba(0,229,255,0.5);transform:translateX(-50%);}
  .cents-fill{position:absolute;top:50%;transform:translateY(-50%);height:6px;border-radius:3px;transition:all 0.07s ease-out;left:50%;width:0;}
  .cents-needle{position:absolute;top:4px;width:4px;height:36px;border-radius:2px;background:var(--accent);transform:translateX(-50%);left:50%;transition:left 0.07s ease-out,background 0.1s;box-shadow:0 0 10px currentColor;}
  .cents-labels{display:flex;justify-content:space-between;padding:2px 2px 0;font-family:'Orbitron','Courier New',monospace;font-size:9px;color:rgba(232,232,240,0.25);}
  .cents-value{text-align:center;font-family:'Orbitron','Courier New',monospace;font-size:22px;font-weight:700;margin-top:4px;transition:color 0.15s;}
  .cents-value.in-tune{color:var(--green);}
  .cents-value.sharp{color:var(--red);}
  .cents-value.flat{color:var(--yellow);}
  .status-text{text-align:center;font-size:12px;letter-spacing:3px;margin-top:4px;height:18px;color:rgba(232,232,240,0.3);}
  .status-text.in-tune{color:var(--green);}
  .debug-line{font-size:10px;color:rgba(0,229,255,0.35);letter-spacing:1px;text-align:center;min-height:15px;font-family:'Orbitron','Courier New',monospace;margin-top:2px;}
  .mic-section{display:flex;flex-direction:column;align-items:center;gap:8px;margin:8px 0 4px;}
  .mic-btn{width:82px;height:82px;border-radius:50%;border:2px solid rgba(0,229,255,0.3);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;position:relative;-webkit-appearance:none;touch-action:manipulation;}
  .mic-btn:active{transform:scale(0.94);}
  .mic-btn.active{border-color:var(--accent);box-shadow:0 0 0 4px rgba(0,229,255,0.1),var(--glow);background:rgba(0,229,255,0.08);}
  .mic-btn.active .mic-icon{color:var(--accent);}
  .mic-icon{font-size:32px;color:rgba(232,232,240,0.3);transition:color 0.2s;}
  .pulse-ring{position:absolute;width:100%;height:100%;border-radius:50%;border:2px solid var(--accent);opacity:0;display:none;}
  .mic-btn.active .pulse-ring{display:block;animation:pulseRing 1.5s ease-out infinite;}
  @keyframes pulseRing{0%{transform:scale(1);opacity:0.6;}100%{transform:scale(1.6);opacity:0;}}
  .mic-hint{font-size:11px;color:rgba(232,232,240,0.25);letter-spacing:1px;text-align:center;}
  .vol-wrap{display:flex;align-items:center;gap:8px;width:130px;}
  .vol-lbl{font-size:10px;color:rgba(232,232,240,0.3);white-space:nowrap;}
  .vol-bar{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
  .vol-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;width:0%;transition:width 0.06s;}
  .strings-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:14px;}
  .strings-title{font-size:10px;letter-spacing:3px;color:rgba(232,232,240,0.4);font-weight:500;margin-bottom:12px;}
  .strings-grid{display:grid;gap:8px;}
  .string-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:var(--surface2);border:1px solid rgba(255,255,255,0.04);transition:all 0.15s;}
  .string-row.active{border-color:rgba(0,229,255,0.4);background:rgba(0,229,255,0.06);box-shadow:0 0 12px rgba(0,229,255,0.1);}
  .string-num{font-family:'Orbitron','Courier New',monospace;font-size:10px;color:rgba(232,232,240,0.3);width:16px;text-align:center;}
  .string-note{font-family:'Orbitron','Courier New',monospace;font-size:18px;font-weight:700;color:var(--text);width:36px;}
  .string-row.active .string-note{color:var(--accent);}
  .string-freq-label{font-family:'Orbitron','Courier New',monospace;font-size:11px;color:rgba(232,232,240,0.25);flex:1;}
  .play-btn{width:30px;height:30px;border-radius:50%;border:1px solid rgba(0,229,255,0.3);background:transparent;color:var(--accent);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;-webkit-appearance:none;flex-shrink:0;touch-action:manipulation;}
  .play-btn:active{background:rgba(0,229,255,0.15);}
  .pitch-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:14px 16px;}
  .pitch-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .pitch-title{font-size:10px;letter-spacing:3px;color:rgba(232,232,240,0.4);font-weight:500;}
  .pitch-val{font-family:'Orbitron','Courier New',monospace;font-size:16px;font-weight:700;color:var(--accent2);}
  .pitch-slider-wrap{display:flex;align-items:center;gap:12px;}
  .pitch-lbl{font-size:10px;color:rgba(232,232,240,0.3);width:38px;letter-spacing:1px;}
  .pitch-lbl:last-child{text-align:right;}
  input[type=range]{flex:1;-webkit-appearance:none;height:4px;border-radius:2px;background:var(--surface2);outline:none;cursor:pointer;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:26px;height:26px;border-radius:50%;background:var(--accent2);box-shadow:0 0 10px rgba(255,107,53,0.5);}
  .pitch-reset{display:flex;justify-content:center;margin-top:10px;}
  .reset-btn{padding:7px 22px;border-radius:20px;border:1px solid rgba(255,107,53,0.3);background:transparent;color:var(--accent2);font-size:11px;letter-spacing:2px;cursor:pointer;font-family:'Noto Sans JP','Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;-webkit-appearance:none;touch-action:manipulation;}
  .reset-btn:active{background:rgba(255,107,53,0.1);}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <div class="header-title">TUNER</div>
      <div class="header-sub">GUITAR · UKULELE</div>
    </div>
    <div class="vol-wrap">
      <span class="vol-lbl">音量</span>
      <div class="vol-bar"><div class="vol-bar-fill" id="volBar"></div></div>
    </div>
  </div>

  <div class="instrument-tabs">
    <div class="inst-tab active" id="tab-guitar" onclick="setInstrument('guitar')">
      <span>🎸</span>ギター
    </div>
    <div class="inst-tab" id="tab-ukulele" onclick="setInstrument('ukulele')">
      <span>🪕</span>ウクレレ
    </div>
  </div>

  <div class="meter-card">
    <div class="note-display">
      <div class="note-name" id="noteName">–</div>
      <div class="note-freq" id="noteFreq">– Hz</div>
    </div>
    <div class="cents-scale">
      <div class="center-line"></div>
      <div class="cents-fill" id="centsFill"></div>
      <div class="cents-needle" id="centsNeedle"></div>
    </div>
    <div class="cents-labels">
      <span>-50</span><span>-25</span><span>0</span><span>+25</span><span>+50</span>
    </div>
    <div class="cents-value" id="centsVal">– ¢</div>
    <div class="status-text" id="statusText">ボタンをタップして開始</div>
    <div class="debug-line" id="dbg"></div>
    <div class="mic-section">
      <button class="mic-btn" id="micBtn">
        <div class="pulse-ring"></div>
        <span class="mic-icon">🎤</span>
      </button>
      <div class="mic-hint" id="micHint">タップしてチューニング開始</div>
    </div>
  </div>

  <div class="strings-card">
    <div class="strings-title" id="stringsTitle">GUITAR STRINGS</div>
    <div class="strings-grid" id="stringsGrid"></div>
  </div>

  <div class="pitch-card">
    <div class="pitch-header">
      <div class="pitch-title">PITCH · A4 基準音</div>
      <div class="pitch-val" id="pitchDisplay">440 Hz</div>
    </div>
    <div class="pitch-slider-wrap">
      <span class="pitch-lbl">430 Hz</span>
      <input type="range" id="pitchSlider" min="430" max="450" value="440" step="0.5" oninput="updatePitch(this.value)">
      <span class="pitch-lbl">450 Hz</span>
    </div>
    <div class="pitch-reset">
      <button class="reset-btn" onclick="resetPitch()">440 Hz にリセット</button>
    </div>
  </div>

</div>
<script>
/* ===== DATA ===== */
const INST = {
  guitar:{label:'GUITAR STRINGS',strings:[
    {n:'1',note:'E4',midi:64},{n:'2',note:'B3',midi:59},
    {n:'3',note:'G3',midi:55},{n:'4',note:'D3',midi:50},
    {n:'5',note:'A2',midi:45},{n:'6',note:'E2',midi:40}
  ]},
  ukulele:{label:'UKULELE STRINGS',strings:[
    {n:'1',note:'A4',midi:69},{n:'2',note:'E4',midi:64},
    {n:'3',note:'C4',midi:60},{n:'4',note:'G4',midi:67}
  ]}
};
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
let A4=440, inst='guitar';
let ctx=null, analyser=null, stream=null;
let active=false, raf=null, noSigN=0;
let tapLock=false;

/* デバイス判定 */
const isIOS = /iP(hone|od|ad)/.test(navigator.userAgent);
const isMobile = isIOS || /Android/.test(navigator.userAgent);

/* 感度パラメータ（環境別） */
const PARAMS = isMobile ? {
  fftSize: 4096,        /* バッファ大＝低音も捕捉しやすい */
  smoothing: 0.3,       /* 少しスムージング＝安定表示 */
  rmsThreshold: 0.003,  /* 感度高め */
  yinThreshold: 0.12,
  noSigLimit: 45,       /* 約1.5秒間は表示を保持 */
  holdFrames: 0,
} : {
  fftSize: 4096,
  smoothing: 0.55,
  rmsThreshold: 0.018,
  yinThreshold: 0.10,
  noSigLimit: 18,
  holdFrames: 4,
};

let holdBuf = [];
let lastDisplayHz = -1;

/* ===== INIT ===== */
setInstrument('guitar');

function dbg(s){ document.getElementById('dbg').textContent=s; }
function midi2hz(m){ return A4*Math.pow(2,(m-69)/12); }

/* ===== INSTRUMENT ===== */
function setInstrument(name){
  inst=name;
  ['guitar','ukulele'].forEach(k=>{
    document.getElementById('tab-'+k).classList.toggle('active',k===name);
  });
  document.getElementById('stringsTitle').textContent=INST[name].label;
  const grid=document.getElementById('stringsGrid');
  grid.innerHTML='';
  INST[name].strings.forEach((s,i)=>{
    const hz=midi2hz(s.midi).toFixed(1);
    const nb=s.note.replace(/\d/,'');
    const oc=s.note.match(/\d/)?s.note.match(/\d/)[0]:'';
    const row=document.createElement('div');
    row.className='string-row'; row.id='sr'+i;
    row.innerHTML=`<div class="string-num">${s.n}</div>
      <div class="string-note">${nb}<span style="font-size:11px;opacity:0.5">${oc}</span></div>
      <div class="string-freq-label">${hz} Hz</div>
      <button class="play-btn" ontouchstart="playRef(${s.midi},event)" onclick="playRef(${s.midi},event)">▶</button>`;
    grid.appendChild(row);
  });
}

/* ===== PITCH CONTROL ===== */
function updatePitch(v){
  A4=parseFloat(v);
  document.getElementById('pitchDisplay').textContent=A4.toFixed(1)+' Hz';
  setInstrument(inst);
}
function resetPitch(){
  A4=440;
  document.getElementById('pitchSlider').value=440;
  document.getElementById('pitchDisplay').textContent='440 Hz';
  setInstrument(inst);
}

/* ===== MIC BUTTON ===== */
// iOSでontouchstart+onclickの二重発火を防ぐためJSでイベント登録
(function(){
  var btn = document.getElementById('micBtn');
  var busy = false;

  function onTap(e){
    e.preventDefault();
    if(busy) return;
    busy = true;
    setTimeout(function(){ busy=false; }, 600);

    if(active){
      stopMic();
    } else {
      startMic();
    }
  }

  btn.addEventListener('touchstart', onTap, {passive:false});
  btn.addEventListener('click', function(e){
    // touchstartが発火済みならclickは無視
    if(!isIOS) onTap(e);
  });
})();

function startMic(){
  // 即UIを更新
  document.getElementById('micBtn').classList.add('active');
  document.getElementById('micHint').textContent='マイク起動中...';
  document.getElementById('statusText').textContent='少々お待ちください';
  dbg('初期化中...');

  // iOSでAudioContextはタップ直後の同期コードで生成する必要がある
  try{
    ctx = new (window.AudioContext || window.webkitAudioContext)();
  }catch(e){
    dbg('CTX ERR:'+e.message);
    micFailed('AudioContextエラー');
    return;
  }

  // AudioContextをresumeしてからマイク取得
  var resumeP = ctx.state === 'suspended' ? ctx.resume() : Promise.resolve();
  resumeP.then(function(){
    dbg('ctx:'+ctx.state);
    return navigator.mediaDevices.getUserMedia({
      audio:{ echoCancellation:false, noiseSuppression:false, autoGainControl:false },
      video:false
    });
  }).then(function(s){
    stream = s;
    dbg('マイクOK');
    analyser = ctx.createAnalyser();
    analyser.fftSize = PARAMS.fftSize;
    analyser.smoothingTimeConstant = PARAMS.smoothing;
    var src = ctx.createMediaStreamSource(stream);
    src.connect(analyser);
    active = true;
    noSigN = 0;
    holdBuf = [];
    document.getElementById('micHint').textContent='演奏してください';
    document.getElementById('statusText').textContent='検出中...';
    dbg((isMobile?'M':'D')+' fft='+PARAMS.fftSize);
    raf = requestAnimationFrame(loop);
  }).catch(function(err){
    dbg('ERR:'+err.name+' '+err.message);
    var msg = 'マイクエラー ('+err.name+')';
    if(err.name==='NotAllowedError') msg='設定→Safari→マイクを許可してください';
    micFailed(msg);
  });
}

function micFailed(msg){
  document.getElementById('statusText').textContent = msg;
  document.getElementById('micBtn').classList.remove('active');
  document.getElementById('micHint').textContent='タップしてチューニング開始';
  if(ctx){ try{ ctx.close(); }catch(_){} ctx=null; }
  active = false;
}

function stopMic(){
  active = false;
  if(raf){ cancelAnimationFrame(raf); raf=null; }
  if(stream){ stream.getTracks().forEach(function(t){ t.stop(); }); stream=null; }
  if(ctx){ try{ ctx.close(); }catch(_){} ctx=null; }
  analyser = null;
  document.getElementById('micBtn').classList.remove('active');
  document.getElementById('micHint').textContent='タップしてチューニング開始';
  clearDisplay();
  dbg('停止');
}

/* ===== MAIN LOOP ===== */
function loop(){
  if(!active||!analyser) return;
  raf=requestAnimationFrame(loop);

  const N=analyser.fftSize;
  const buf=new Float32Array(N);
  analyser.getFloatTimeDomainData(buf);

  /* RMS */
  let sq=0;
  for(let i=0;i<N;i++) sq+=buf[i]*buf[i];
  const rms=Math.sqrt(sq/N);
  document.getElementById('volBar').style.width=Math.min(rms*500,100)+'%';

  if(rms < PARAMS.rmsThreshold){
    noSigN++;
    if(noSigN > PARAMS.noSigLimit){ clearDisplay(); dbg('無音 rms='+rms.toFixed(5)); }
    return;
  }
  noSigN=0;

  const hz=yin(buf,ctx.sampleRate);
  dbg((isMobile?'M':'D')+' rms='+rms.toFixed(4)+' hz='+(hz>0?hz.toFixed(1):'NG'));

  if(hz>50 && hz<1400){
    if(PARAMS.holdFrames===0){
      showNote(hz); highlightStr(hz);
    } else {
      /* デスクトップ：連続N回近い値が出たら確定 */
      holdBuf.push(hz);
      if(holdBuf.length > PARAMS.holdFrames) holdBuf.shift();
      if(holdBuf.length === PARAMS.holdFrames){
        const mn=Math.min(...holdBuf), mx=Math.max(...holdBuf);
        if(mx/mn < 1.02){ /* 2%以内のばらつきなら確定 */
          const avg=holdBuf.reduce((a,b)=>a+b,0)/holdBuf.length;
          showNote(avg); highlightStr(avg);
        }
      }
    }
  } else {
    holdBuf=[];
  }
}

/* ===== YIN ===== */
function yin(buf,sr){
  const W=buf.length;
  const H=Math.floor(W/2);
  const TH=PARAMS.yinThreshold;

  // 差分関数
  const d=new Float32Array(H);
  for(let t=1;t<H;t++){
    let s=0;
    for(let j=0;j<H;j++){ const x=buf[j]-buf[j+t]; s+=x*x; }
    d[t]=s;
  }
  // CMNDF
  const c=new Float32Array(H);
  c[0]=1; let run=0;
  for(let t=1;t<H;t++){ run+=d[t]; c[t]= run>0 ? d[t]*t/run : 0; }

  // 極小値探索
  let tau=-1;
  for(let t=2;t<H-1;t++){
    if(c[t]<TH && c[t]<c[t-1] && c[t]<c[t+1]){ tau=t; break; }
  }
  if(tau<0){
    let mv=Infinity;
    for(let t=2;t<H;t++) if(c[t]<mv){mv=c[t];tau=t;}
    if(mv>0.25) return -1;
  }
  // 放物線補間
  if(tau>0 && tau<H-1){
    const a=c[tau-1],b=c[tau],cc2=c[tau+1];
    tau += (cc2-a)/(2*(2*b-cc2-a));
  }
  return tau>0 ? sr/tau : -1;
}

/* ===== DISPLAY ===== */
function showNote(hz){
  const n=12*(Math.log2(hz/A4))+69;
  const r=Math.round(n);
  const idx=((r%12)+12)%12;
  const oct=Math.floor(r/12)-1;
  const cents=Math.round((n-r)*100);
  const name=NOTES[idx];

  document.getElementById('noteName').textContent=name+oct;
  document.getElementById('noteFreq').textContent=hz.toFixed(1)+' Hz';

  const abs=Math.abs(cents);
  const cls=abs<=5?'in-tune':cents>0?'sharp':'flat';
  document.getElementById('noteName').className='note-name '+cls;
  document.getElementById('centsVal').className='cents-value '+cls;
  document.getElementById('centsVal').textContent=(cents>0?'+':'')+cents+' ¢';

  const pct=Math.max(2,Math.min(98,50+(cents/50)*50));
  const nd=document.getElementById('centsNeedle');
  nd.style.left=pct+'%';
  nd.style.background=cls==='in-tune'?'var(--green)':cls==='sharp'?'var(--red)':'var(--yellow)';
  const fl=document.getElementById('centsFill');
  fl.style.left=Math.min(50,pct)+'%';
  fl.style.width=Math.abs(pct-50)+'%';
  fl.style.background=nd.style.background;

  const st=document.getElementById('statusText');
  if(abs<=5){st.textContent='✓  IN TUNE';st.className='status-text in-tune';}
  else if(cents>0){st.textContent='▲  高い (Sharp)';st.className='status-text';}
  else{st.textContent='▼  低い (Flat)';st.className='status-text';}
}

function clearDisplay(){
  ['noteName','noteFreq','centsVal'].forEach(id=>{
    const el=document.getElementById(id);
    if(id==='noteName') el.textContent='–';
    else if(id==='noteFreq') el.textContent='– Hz';
    else el.textContent='– ¢';
    el.className=id==='noteName'?'note-name':(id==='centsVal'?'cents-value':'');
  });
  document.getElementById('centsNeedle').style.left='50%';
  document.getElementById('centsFill').style.width='0';
  const st=document.getElementById('statusText');
  st.textContent=active?'検出中...':'ボタンをタップして開始';
  st.className='status-text';
}

function highlightStr(hz){
  const ss=INST[inst].strings;
  let best=-1,bd=9999;
  ss.forEach((s,i)=>{ const d=Math.abs(hz-midi2hz(s.midi)); if(d<bd){bd=d;best=i;} });
  ss.forEach((_,i)=>{ const r=document.getElementById('sr'+i); if(r) r.classList.toggle('active',i===best); });
}

/* ===== 自動マイクオフ：ページ離脱・非表示時 ===== */
document.addEventListener('visibilitychange', function(){
  if(document.hidden && active) stopMic();
});
window.addEventListener('pagehide', function(){
  if(active) stopMic();
});
window.addEventListener('beforeunload', function(){
  if(active) stopMic();
});

/* ===== REFERENCE TONE（低音強化版）===== */
function playRef(midi,e){
  e.preventDefault(); e.stopPropagation();
  const c = new (window.AudioContext||window.webkitAudioContext)();
  const t = c.currentTime;
  const freq = midi2hz(midi);
  const dur = 5.0;

  // 低音ほど倍音を多く・音量を上げる補正
  // midi=40(E2,82Hz) → boost大, midi=69(A4,440Hz) → boost小
  const lowBoost = Math.max(0, (69 - midi) / 29); // 0〜1

  // マスターゲイン
  const master = c.createGain();
  master.connect(c.destination);
  master.gain.setValueAtTime(0, t);
  master.gain.linearRampToValueAtTime(0.65 + lowBoost * 0.25, t + 0.01);
  master.gain.setValueAtTime(0.65 + lowBoost * 0.25, t + 0.3);
  master.gain.exponentialRampToValueAtTime(0.001, t + dur);

  // 倍音構成: [倍率, 相対音量]
  // 低音では2・3倍音を強めにして聞こえやすくする
  const harmonics = [
    [1,   1.0],
    [2,   0.5  + lowBoost * 0.5],   // 2倍音：低音で強調
    [3,   0.25 + lowBoost * 0.35],  // 3倍音
    [4,   0.12 + lowBoost * 0.2],   // 4倍音
    [5,   0.08 + lowBoost * 0.1],   // 5倍音（倍音感）
    [6,   0.04],
  ];

  harmonics.forEach(([ratio, vol]) => {
    const osc = c.createOscillator();
    const g   = c.createGain();
    osc.connect(g);
    g.connect(master);

    osc.type = 'sine';
    osc.frequency.value = freq * ratio;

    // 基音(ratio=1)は全体の長さいっぱい鳴らす。倍音は速めに減衰
    const sustain = ratio === 1
      ? dur * 0.95                          // 基音：ほぼ全期間
      : dur * (1 / ratio) * 1.4;           // 倍音：高次ほど短い
    g.gain.setValueAtTime(vol, t);
    g.gain.setValueAtTime(vol * 0.9, t + 0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, t + Math.max(sustain, 0.4));

    osc.start(t);
    osc.stop(t + dur);
    osc.onended = () => { try{ c.close(); }catch(_){} };
  });
}
